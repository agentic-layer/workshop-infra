apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librechat
  namespace: librechat
spec:
  interval: 5m
  chart:
    spec:
      chart: librechat
      version: '2.0.2'
      sourceRef:
        kind: HelmRepository
        name: librechat
        namespace: librechat
  values:
    ingress:
      enabled: false

    librechat:
      existingConfigYaml: "librechat-config"
      configEnv:
        ALLOW_EMAIL_LOGIN: "true"
        ALLOW_REGISTRATION: "true"

    mongodb:
      image:
        tag: latest
      updateStrategy:
        type: Recreate
      resources:
        requests:
          cpu: 200m
          memory: 400Mi
        limits:
          cpu: 500m
          memory: 1Gi

    updateStrategy:
      type: Recreate

    meilisearch:
      enabled: false

    resources:
      requests:
        cpu: 10m
        memory: 300Mi
      limits:
        cpu: 1000m
        memory: 1Gi
