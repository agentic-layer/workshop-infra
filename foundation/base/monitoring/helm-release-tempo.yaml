apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: monitoring
spec:
  chart:
    spec:
      chart: tempo
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      version: "1.23.3"
  interval: 1h0m0s
  releaseName: tempo
  values:
    mode: monolithic
    tempo:
      service:
        type: ClusterIP
        port: 3200
      persistence:
        enabled: true
        size: 10Gi