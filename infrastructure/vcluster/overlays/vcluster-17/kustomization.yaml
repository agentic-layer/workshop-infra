apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vcluster-17
resources:
  - namespace.yaml
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /metadata/name
        value: vcluster-17
      - op: replace
        path: /metadata/namespace
        value: vcluster-17
    target:
      kind: HelmRelease
      name: vcluster-template
